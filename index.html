<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebalanceador de Carteira · XP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{--bg:#0e1117;--bg2:#161b25;--bg3:#1c2333;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--gold:#f5c842;--gold2:#e0a800;--text:#e8eaf0;--text2:#8b93a7;--text3:#555e72;--green:#2ecc71;--green-bg:rgba(46,204,113,0.12);--red:#e74c3c;--red-bg:rgba(231,76,60,0.12);--amber:#f39c12;--amber-bg:rgba(243,156,18,0.12);--blue:#3498db;--blue-bg:rgba(52,152,219,0.12)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600}
.dot{width:28px;height:28px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000}
.header-date{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace}
.main{max-width:1200px;margin:0 auto;padding:2rem}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.upload-row{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.file-label{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1.5px dashed var(--border2);border-radius:8px;padding:9px 14px;cursor:pointer;font-size:13px;color:var(--text2);flex:1;min-width:180px;transition:border-color .2s,color .2s}
.file-label:hover{border-color:var(--gold);color:var(--gold)}
#filePdf{display:none}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.btn-full{background:var(--gold);color:#000;font-size:14px;font-weight:600;width:100%;padding:12px;justify-content:center;margin-top:1rem;border-radius:10px}
.btn-full:hover{background:var(--gold2);transform:translateY(-1px)}
.status{display:none;align-items:center;gap:8px;padding:9px 13px;border-radius:8px;font-size:13px;margin-top:.75rem}
.status.show{display:flex}
.status-ok{background:var(--green-bg);color:var(--green);border:1px solid rgba(46,204,113,.25)}
.status-err{background:var(--red-bg);color:var(--red);border:1px solid rgba(231,76,60,.25)}
.patrim-tag{display:none;align-items:center;gap:6px;margin-top:.6rem;background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;color:var(--gold);width:fit-content}
.patrim-tag.show{display:flex}
.perfis-row{display:flex;gap:8px;margin-bottom:1.5rem}
.perfil-btn{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:center;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);transition:all .15s}
.perfil-btn:hover{border-color:var(--gold);color:var(--gold)}
.perfil-btn.ativo{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.classe-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.classe-row:last-of-type{border-bottom:none}
.dot8{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.c0{background:#f5c842}.c1{background:#3498db}.c2{background:#2ecc71}.c3{background:#9b59b6}.c4{background:#e74c3c}
.classe-nome{flex:1;font-size:13px}
.classe-input{width:72px;padding:6px 10px;text-align:right;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:13px;font-family:'DM Mono',monospace}
.classe-input:focus{outline:none;border-color:var(--gold)}
.pct-label{font-size:12px;color:var(--text3);width:14px}
.total-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:500;margin-top:.75rem}
.total-ok{background:var(--green-bg);color:var(--green);border:1px solid rgba(46,204,113,.2)}
.total-err{background:var(--red-bg);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.alvo-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.alvo-row:last-of-type{border-bottom:none}
.alvo-nome{flex:1;font-size:13px}
.alvo-bar-wrap{width:60px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.alvo-bar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s}
.alvo-pct{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;color:var(--gold);min-width:36px;text-align:right}
.rec-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.rec-row:last-of-type{border-bottom:none}
.rec-nome{flex:1;font-size:13px;min-width:100px}
.rec-nums{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.b-manter{background:var(--green-bg);color:var(--green);border:1px solid rgba(46,204,113,.2)}
.b-alocar{background:var(--red-bg);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.b-retirar{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(243,156,18,.2)}
.resumo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
@media(max-width:500px){.resumo-grid{grid-template-columns:repeat(2,1fr)}}
.resumo-item{background:var(--bg3);border-radius:8px;padding:.75rem;text-align:center}
.resumo-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.resumo-val{font-size:22px;font-weight:600;font-family:'DM Mono',monospace}
.legenda{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)}
.legenda-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.debug-box{display:none;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.75rem;font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);max-height:180px;overflow-y:auto;margin-top:.75rem;white-space:pre-wrap;line-height:1.7}
.debug-box.show{display:block}
.overlay{display:none;position:fixed;inset:0;background:rgba(14,17,23,.88);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
.overlay.show{display:flex}
.spin{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.spin-text{font-size:14px;color:var(--text2)}
.fade-in{animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.footer{text-align:center;font-size:11px;color:var(--text3);padding:2rem;border-top:1px solid var(--border);margin-top:1rem}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="spin"></div>
  <div class="spin-text">Processando PDF...</div>
</div>

<header class="header">
  <div class="header-logo"><div class="dot">XP</div>Rebalanceador de Carteira</div>
  <div class="header-date" id="hDate"></div>
</header>

<main class="main">
  <div class="card">
    <div class="card-title">Importar relatório XP (PDF)</div>
    <div class="upload-row">
      <label class="file-label" for="filePdf">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <span id="fileName">Selecionar arquivo PDF...</span>
      </label>
      <input type="file" id="filePdf" accept=".pdf">
      <button class="btn btn-gold" id="btnImportar">Importar PDF</button>
      <button class="btn btn-ghost" id="btnLimpar">Limpar</button>
    </div>
    <div id="status" class="status"></div>
    <div id="patrimTag" class="patrim-tag">
      <span id="patrimVal"></span>
    </div>
    <div id="debugBox" class="debug-box"></div>
  </div>

  <div class="perfis-row" id="perfisRow"></div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">Alocação atual</div>
      <div id="inputsAtual"></div>
      <div id="totalBar" class="total-bar total-err">
        <span>Total</span><span id="totalVal">0,00%</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Carteira recomendada · <span id="perfilLabel" style="color:var(--gold)">Moderado</span></div>
      <div id="tabelaAlvo"></div>
      <button class="btn btn-full" id="btnAnalisar">Analisar rebalanceamento</button>
    </div>
  </div>

  <div id="resultArea" class="card fade-in" style="display:none">
    <div class="card-title">Recomendações</div>
    <div id="listaRec"></div>
    <div class="resumo-grid" id="resumoGrid"></div>
  </div>
</main>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const PERFIS = {
  Conservador: { "Pós Fixado": 85, "Pré Fixado": 15, "Inflação": 0, "Multimercado": 0, "Renda Variável": 0 },
  Moderado: { "Pós Fixado": 54, "Pré Fixado": 13, "Inflação": 20, "Multimercado": 5, "Renda Variável": 8 },
  Agressivo: { "Pós Fixado": 44, "Pré Fixado": 15, "Inflação": 24, "Multimercado": 5, "Renda Variável": 12 }
};

const CLASSES = ["Pós Fixado", "Pré Fixado", "Inflação", "Multimercado", "Renda Variável"];
const CORES = ["c0","c1","c2","c3","c4"];
let perfilAtivo = "Moderado";
let inputsMap = {};

function fmtPct(v) { return v.toFixed(2).replace('.', ',') + ' %'; }
function fmtBRL(v) { return 'R$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits: 2}); }
function setStatus(msg, tipo) { const el = document.getElementById('status'); el.innerHTML = msg; el.className = 'status show status-' + tipo; }
function dbg(txt) { const el = document.getElementById('debugBox'); el.classList.add('show'); el.textContent += txt + '\n'; }

function atualizarTotal() {
  let t = 0;
  CLASSES.forEach(c => { t += parseFloat(inputsMap[c]?.value || 0) || 0; });
  document.getElementById('totalVal').textContent = fmtPct(t);
  document.getElementById('totalBar').className = 'total-bar ' + (Math.abs(t - 100) < 0.1 ? 'total-ok' : 'total-err');
}

async function extrairDadosPDF(file) {
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  let fullText = "";
  let rawTokens = [];

  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const tc = await page.getTextContent();
    tc.items.forEach(it => {
        fullText += it.str + " ";
        rawTokens.push(it.str.trim());
    });
  }

  // Normalização para busca
  const clean = (s) => s.normalize('NFD').replace(/[\u0300-\u036f]/g, "").toLowerCase();
  
  const res = {};
  
  // Mapeamento de RegEx para capturar Nome + Valor
  // Exemplo: "Inflação (20,90%) R$ 609.356,52"
  const patterns = [
    { id: "Pós Fixado", re: /pos\s*fixado.*?(\d+[,.]\d+)\s*%.*?r\$\s*([\d.]+,\d+)/i },
    { id: "Pré Fixado", re: /pre\s*fixado.*?(\d+[,.]\d+)\s*%.*?r\$\s*([\d.]+,\d+)/i },
    { id: "Inflação", re: /inflacao.*?(\d+[,.]\d+)\s*%.*?r\$\s*([\d.]+,\d+)/i },
    { id: "Multimercado", re: /multimercado.*?(\d+[,.]\d+)\s*%.*?r\$\s*([\d.]+,\d+)/i },
    { id: "Renda Variável", re: /renda\s*variavel.*?(\d+[,.]\d+)\s*%.*?r\$\s*([\d.]+,\d+)/i }
  ];

  patterns.forEach(p => {
    const match = fullText.match(p.re);
    if (match) {
        const pct = parseFloat(match[1].replace(',', '.'));
        const val = parseFloat(match[2].replace(/\./g, '').replace(',', '.'));
        res[p.id] = { pct, val };
        dbg(`[Sincronizado] ${p.id}: ${pct}% | ${fmtBRL(val)}`);
    }
  });

  // Fallback: Se o RegEx combinado falhar, tenta achar apenas o percentual por proximidade
  if (Object.keys(res).length < 2) {
      dbg("Iniciando busca secundária por proximidade...");
      const NOMES_BUSCA = [
        { label: "Pós Fixado", keywords: ["pos fixado"] },
        { label: "Pré Fixado", keywords: ["pre fixado"] },
        { label: "Inflação", keywords: ["inflacao"] },
        { label: "Multimercado", keywords: ["multimercado"] },
        { label: "Renda Variável", keywords: ["renda variavel", "acoes"] }
      ];

      rawTokens.forEach((t, i) => {
          const tClean = clean(t);
          NOMES_BUSCA.forEach(n => {
              if (n.keywords.some(k => tClean.includes(k)) && !res[n.label]) {
                  // Procura um % nos próximos 10 tokens
                  for (let k = i+1; k < i+12; k++) {
                      if (rawTokens[k]?.includes('%')) {
                          const valStr = rawTokens[k].match(/(\d+[,.]\d+)/);
                          if (valStr) {
                              res[n.label] = { pct: parseFloat(valStr[1].replace(',', '.')) };
                              dbg(`[Proximidade] ${n.label}: ${res[n.label].pct}%`);
                              break;
                          }
                      }
                  }
              }
          });
      });
  }

  // Patrimônio Bruto
  let patrimonio = 0;
  const patMatch = fullText.match(/patrimonio\s*total\s*bruto.*?r\$\s*([\d.]+,\d+)/i);
  if (patMatch) patrimonio = parseFloat(patMatch[1].replace(/\./g, '').replace(',', '.'));

  return { res, patrimonio };
}

function renderInputs() {
  const c = document.getElementById('inputsAtual'); c.innerHTML = '';
  CLASSES.forEach((cl, idx) => {
    const row = document.createElement('div'); row.className = 'classe-row';
    row.innerHTML = `<div class="dot8 ${CORES[idx]}"></div><span class="classe-nome">${cl}</span><input class="classe-input" type="number" step="any" value="0"><span class="pct-label">%</span>`;
    c.appendChild(row);
    inputsMap[cl] = row.querySelector('input');
    inputsMap[cl].addEventListener('input', atualizarTotal);
  });
}

function renderAlvo() {
  const rec = PERFIS[perfilAtivo];
  document.getElementById('perfilLabel').textContent = perfilAtivo;
  document.getElementById('tabelaAlvo').innerHTML = CLASSES.map((c, i) => `
    <div class="alvo-row"><div class="dot8 ${CORES[i]}"></div><span class="alvo-nome">${c}</span>
    <div class="alvo-bar-wrap"><div class="alvo-bar-fill" style="width:${rec[c]}%"></div></div>
    <span class="alvo-pct">${rec[c]}%</span></div>`).join('');
}

function renderPerfis() {
  document.getElementById('perfisRow').innerHTML = Object.keys(PERFIS).map(p => `
    <button class="perfil-btn ${p === perfilAtivo ? 'ativo' : ''}" data-p="${p}">${p}</button>`).join('');
  document.querySelectorAll('.perfil-btn').forEach(b => b.addEventListener('click', () => {
    perfilAtivo = b.dataset.p; renderPerfis(); renderAlvo();
  }));
}

document.getElementById('btnImportar').addEventListener('click', async () => {
  const file = document.getElementById('filePdf').files[0];
  if (!file) return;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('debugBox').textContent = "";
  
  try {
    const { res, patrimonio } = await extrairDadosPDF(file);
    let encontrados = 0;
    CLASSES.forEach(c => {
        if (res[c]) {
            inputsMap[c].value = res[c].pct;
            encontrados++;
        }
    });
    atualizarTotal();
    if (encontrados > 0) {
        setStatus(`Sucesso: ${encontrados} classes extraídas.`, 'ok');
        if (patrimonio) {
            document.getElementById('patrimVal').textContent = "Patrimônio Total: " + fmtBRL(patrimonio);
            document.getElementById('patrimTag').classList.add('show');
        }
    } else {
        setStatus("Não foi possível identificar as classes. Tente outro relatório.", "err");
    }
  } catch (e) {
    setStatus("Erro ao ler PDF: " + e.message, "err");
  } finally {
    document.getElementById('overlay').classList.remove('show');
  }
});

document.getElementById('btnAnalisar').addEventListener('click', () => {
  document.getElementById('resultArea').style.display = 'block';
  // Lógica de recomendação simplificada
  const alvo = PERFIS[perfilAtivo];
  document.getElementById('listaRec').innerHTML = CLASSES.map((c, i) => {
      const atual = parseFloat(inputsMap[c].value) || 0;
      const diff = alvo[c] - atual;
      let badge = diff > 0.5 ? '<span class="badge b-alocar">Alocar</span>' : (diff < -0.5 ? '<span class="badge b-retirar">Retirar</span>' : '<span class="badge b-manter">Manter</span>');
      return `<div class="rec-row"><span>${c}</span> <strong>${atual}% → ${alvo[c]}%</strong> ${badge}</div>`;
  }).join('');
});

renderInputs(); renderPerfis(); renderAlvo();
</script>
</body>
</html>
