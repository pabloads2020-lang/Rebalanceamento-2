<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebalanceador de Carteira · PBF (10 Classes + PDF Adaptativo)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg: #0e1117; --bg2: #161b25; --bg3: #1c2333;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --gold: #f5c842; --gold2: #e0a800;
  --text: #e8eaf0; --text2: #8b93a7; --text3: #555e72;
  --green: #2ecc71; --green-bg: rgba(46,204,113,0.12);
  --red: #e74c3c; --red-bg: rgba(231,76,60,0.12);
  --amber: #f39c12; --amber-bg: rgba(243,156,18,0.12);
  --blue: #3498db; --blue-bg: rgba(52,152,219,0.12);
  --header-bg: #161b25; --header-border: rgba(255,255,255,0.07);
  --card-bg: #161b25; --card-border: rgba(255,255,255,0.07);
  --input-bg: #1c2333; --input-border: rgba(255,255,255,0.13);
  --alvo-bar-bg: #1c2333; --resumo-item-bg: #1c2333;
  --debug-bg: #1c2333; --overlay-bg: rgba(14,17,23,.88);
  --footer-border: rgba(255,255,255,0.07);
}
body.light {
  --bg: #f5f7fa; --bg2: #ffffff; --bg3: #f0f2f5;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.12);
  --gold: #d4a017; --gold2: #b8860b;
  --text: #1a1a2e; --text2: #4a5568; --text3: #718096;
  --green: #27ae60; --green-bg: rgba(39,174,96,0.1);
  --red: #e74c3c; --red-bg: rgba(231,76,60,0.1);
  --amber: #e67e22; --amber-bg: rgba(230,126,34,0.1);
  --header-bg: #ffffff; --header-border: rgba(0,0,0,0.08);
  --card-bg: #ffffff; --card-border: rgba(0,0,0,0.08);
  --input-bg: #ffffff; --input-border: #e2e8f0;
  --alvo-bar-bg: #e2e8f0; --resumo-item-bg: #f7fafc;
  --debug-bg: #f7fafc; --overlay-bg: rgba(255,255,255,.95);
  --footer-border: rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }
body { 
  font-family: 'SF Mono', 'DM Sans', 'Courier New', monospace; 
  background: var(--bg); 
  color: var(--text); 
  min-height: 100vh; 
}

.header { background: var(--header-bg); border-bottom: 1px solid var(--header-border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }
.dot { width: 28px; height: 28px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #000; }
.header-right { display: flex; align-items: center; gap: 1rem; }
.header-date { font-size: 13px; color: var(--text3); }
.theme-toggle { background: var(--bg3); border: 1px solid var(--border2); border-radius: 30px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
.theme-toggle:hover { border-color: var(--gold); transform: scale(1.05); }
.main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
.card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
.card-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title span { font-size: 11px; font-weight: 400; letter-spacing: 0; text-transform: none; }
.upload-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
.file-label { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1.5px dashed var(--border2); border-radius: 8px; padding: 9px 14px; cursor: pointer; font-size: 14px; color: var(--text2); flex: 1; min-width: 180px; }
.file-label:hover { border-color: var(--gold); color: var(--gold); }
#filePdf { display: none; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; white-space: nowrap; }
.btn-gold { background: var(--gold); color: #000; }
.btn-gold:hover { background: var(--gold2); transform: translateY(-1px); }
.btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.btn-full { background: var(--gold); color: #000; font-size: 15px; font-weight: 600; width: 100%; padding: 12px; justify-content: center; margin-top: 1rem; border-radius: 10px; }
.btn-full:hover { background: var(--gold2); transform: translateY(-1px); }
.btn-debug { background: transparent; border: 1px solid var(--border2); border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 500; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 6px; }
.btn-debug:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,200,66,0.1); }
.status { display: none; align-items: center; gap: 8px; padding: 9px 13px; border-radius: 8px; font-size: 14px; margin-top: 0.75rem; }
.status.show { display: flex; }
.status-ok { background: var(--green-bg); color: var(--green); border: 1px solid rgba(46, 204, 113, 0.25); }
.status-err { background: var(--red-bg); color: var(--red); border: 1px solid rgba(231, 76, 60, 0.25); }
.patrim-tag { display: none; align-items: center; gap: 6px; margin-top: 0.6rem; background: rgba(245, 200, 66, 0.1); border: 1px solid rgba(245, 200, 66, 0.25); border-radius: 20px; padding: 4px 12px; font-size: 13px; font-weight: 500; color: var(--gold); width: fit-content; }
.patrim-tag.show { display: flex; }
.perfis-row { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.perfil-btn { flex: 1; min-width: 100px; padding: 10px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; text-align: center; border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); }
.perfil-btn:hover { border-color: var(--gold); color: var(--gold); }
.perfil-btn.ativo { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 600; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
@media (max-width: 700px) { .grid2 { grid-template-columns: 1fr; } }
.classe-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.classe-row:last-of-type { border-bottom: none; }
.dot8 { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.c0 { background: #f5c842; }
.c1 { background: #3498db; }
.c2 { background: #2ecc71; }
.c3 { background: #9b59b6; }
.c4 { background: #e74c3c; }
.c5 { background: #1abc9c; }
.c6 { background: #e67e22; }
.c7 { background: #95a5a6; }
.c8 { background: #f1c40f; }
.c9 { background: #e84393; }
.classe-nome { flex: 1; font-size: 14px; }
.classe-input { width: 72px; padding: 6px 10px; text-align: right; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 7px; color: var(--text); font-size: 14px; font-weight: 500; }
.classe-input:focus { outline: none; border-color: var(--gold); }
.total-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 8px; font-size: 14px; font-weight: 500; margin-top: 0.75rem; }
.total-ok { background: var(--green-bg); color: var(--green); border: 1px solid rgba(46, 204, 113, 0.2); }
.total-err { background: var(--red-bg); color: var(--red); border: 1px solid rgba(231, 76, 60, 0.2); }
.alvo-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.alvo-row:last-of-type { border-bottom: none; }
.alvo-nome { flex: 1; font-size: 14px; }
.alvo-bar-wrap { width: 60px; height: 4px; background: var(--alvo-bar-bg); border-radius: 2px; overflow: hidden; }
.alvo-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; }
.alvo-pct { font-size: 14px; font-weight: 600; color: var(--gold); min-width: 36px; text-align: right; }
.rec-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.rec-nome { flex: 1; font-size: 14px; min-width: 110px; }
.rec-nums { font-size: 13px; color: var(--text2); }
.rec-valor { font-size: 13px; font-weight: 600; min-width: 110px; }
.rec-valor.alocar { color: var(--green); }
.rec-valor.retirar { color: var(--red); }
.rec-valor.manter { color: var(--amber); }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.b-manter { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(243, 156, 18, 0.3); }
.b-alocar { background: var(--green-bg); color: var(--green); border: 1px solid rgba(46, 204, 113, 0.3); }
.b-retirar { background: var(--red-bg); color: var(--red); border: 1px solid rgba(231, 76, 60, 0.3); }
.resumo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
@media (max-width: 500px) { .resumo-grid { grid-template-columns: repeat(2, 1fr); } }
.resumo-item { background: var(--resumo-item-bg); border-radius: 8px; padding: 0.75rem; text-align: center; }
.resumo-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
.resumo-val { font-size: 23px; font-weight: 600; }
.legenda { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
.legenda-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text3); }
.debug-wrapper { margin-top: 0.75rem; }
.debug-header { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 0.5rem; }
.debug-box { display: none; background: var(--debug-bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; font-size: 12px; color: var(--text3); max-height: 250px; overflow-y: auto; white-space: pre-wrap; line-height: 1.7; }
.debug-box.show { display: block; }
.overlay { display: none; position: fixed; inset: 0; background: var(--overlay-bg); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
.overlay.show { display: flex; }
.spin { width: 40px; height: 40px; border: 3px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: rot 0.8s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }
.footer { text-align: center; font-size: 12px; color: var(--text3); padding: 2rem; border-top: 1px solid var(--footer-border); margin-top: 1rem; }
.arrow { transition: transform 0.2s ease; display: inline-block; }
.arrow.rotated { transform: rotate(90deg); }
</style>
</head>
<body>

<div class="overlay" id="overlay"><div class="spin"></div><div class="spin-text">Processando PDF...</div></div>

<header class="header">
  <div class="header-logo">
    <div class="dot">PBF</div>
    Rebalanceador de Carteira · 10 Classes
  </div>
  <div class="header-right">
    <div class="header-date" id="hDate"></div>
    <button class="theme-toggle" id="themeToggle" title="Alternar modo claro/escuro">🌙</button>
  </div>
</header>

<main class="main">
  <div class="card">
    <div class="card-title">
      Importar relatório XP (PDF)
      <span>🔍 Suporte a Caixa e Proventos</span>
    </div>
    <div class="upload-row">
      <label class="file-label" for="filePdf"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><span id="fileName">Selecionar arquivo PDF...</span></label>
      <input type="file" id="filePdf" accept=".pdf">
      <button class="btn btn-gold" id="btnImportar">Importar PDF</button>
      <button class="btn btn-ghost" id="btnLimpar">Limpar</button>
    </div>
    <div id="status" class="status"></div>
    <div id="patrimTag" class="patrim-tag"><span id="patrimVal"></span></div>
    
    <div class="debug-wrapper">
      <div class="debug-header">
        <button class="btn-debug" id="btnToggleDebug">
          <span class="arrow" id="debugArrow">▶</span> 
          📋 Detalhes da leitura do PDF
        </button>
      </div>
      <div id="debugBox" class="debug-box"></div>
    </div>
  </div>

  <div class="perfis-row" id="perfisRow"></div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">Alocação atual</div>
      <div id="inputsAtual"></div>
      <div id="totalBar" class="total-bar total-err"><span>Total</span><span id="totalVal">0,00%</span></div>
    </div>
    <div class="card">
      <div class="card-title">Carteira recomendada · <span id="perfilLabel" style="color:var(--gold)">Moderado</span></div>
      <div id="tabelaAlvo"></div>
      <button class="btn btn-full" id="btnAnalisar">Analisar rebalanceamento</button>
    </div>
  </div>

  <div id="resultArea" class="card fade-in" style="display:none">
    <div class="card-title">Recomendações de rebalanceamento</div>
    <div id="listaRec"></div>
    <div class="resumo-grid" id="resumoGrid"></div>
    <div class="legenda">
      <div class="legenda-item"><div class="dot8" style="background:var(--amber)"></div>Manter</div>
      <div class="legenda-item"><div class="dot8" style="background:var(--green)"></div>Alocar</div>
      <div class="legenda-item"><div class="dot8" style="background:var(--red)"></div>Retirar</div>
    </div>
  </div>
</main>

<footer class="footer">Material informativo — não constitui recomendação de investimento.</footer>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ========== PERFIS ORIGINAIS ==========
const PERFIS = {
  Conservador: {
    "Renda Fixa Pós": 85,
    "Renda Fixa Pré": 15,
    "Renda Fixa Inflação": 0,
    "Multiestratégia": 0,
    "Renda Variável": 0,
    "Renda Fixa Global": 0,
    "Renda Variável Global": 0,
    "Alternativo": 0
  },
  Moderado: {
    "Renda Fixa Pós": 54,
    "Renda Fixa Pré": 13,
    "Renda Fixa Inflação": 20,
    "Multiestratégia": 5,
    "Renda Variável": 4,
    "Renda Fixa Global": 0,
    "Renda Variável Global": 4,
    "Alternativo": 0
  },
  Agressivo: {
    "Renda Fixa Pós": 44,
    "Renda Fixa Pré": 15,
    "Renda Fixa Inflação": 24,
    "Multiestratégia": 5,
    "Renda Variável": 6,
    "Renda Fixa Global": 0,
    "Renda Variável Global": 6,
    "Alternativo": 0
  }
};

// CLASSES COMPLETAS
const CLASSES = [
  "Renda Fixa Pós",
  "Renda Fixa Pré",
  "Renda Fixa Inflação",
  "Multiestratégia",
  "Renda Variável",
  "Renda Fixa Global",
  "Renda Variável Global",
  "Alternativo",
  "Caixa",
  "Proventos"
];

const CORES = ["c0","c1","c2","c3","c4","c5","c6","c7","c8","c9"];

let perfilAtivo = "Moderado";
let inputsMap = {};
let patrimonioTotal = 0;
let debugContent = [];

function fmtPct(v) { return v.toFixed(2).replace('.', ',') + ' %'; }
function fmtBRL(v) { return 'R$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits: 2}); }
function setStatus(msg, tipo) { const el = document.getElementById('status'); el.innerHTML = msg; el.className = 'status show status-' + tipo; setTimeout(() => el.classList.remove('show'), 4000); }
function dbg(txt) { 
  debugContent.push(txt);
  const el = document.getElementById('debugBox'); 
  el.textContent = debugContent.join('\n');
}
function clearDebug() { 
  debugContent = []; 
  document.getElementById('debugBox').textContent = '';
}

function atualizarTotal() {
  let t = 0;
  CLASSES.forEach(c => { t += parseFloat(inputsMap[c]?.value || 0) || 0; });
  document.getElementById('totalVal').textContent = fmtPct(t);
  document.getElementById('totalBar').className = 'total-bar ' + (Math.abs(t - 100) < 0.1 ? 'total-ok' : 'total-err');
}

async function extrairDadosPDF(file) {
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  
  let textoCompleto = '';
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const tc = await page.getTextContent();
    const pageText = tc.items.map(item => item.str).join(' ');
    textoCompleto += pageText + ' ';
  }
  
  dbg('=== TRECHO DO PDF (primeiros 2000 caracteres) ===');
  dbg(textoCompleto.substring(0, 2000));
  
  let secaoAlvo = textoCompleto;
  const idxEstrategias = textoCompleto.indexOf('Estratégias');
  const idxComposicao = textoCompleto.indexOf('COMPOSIÇÃO');
  
  if (idxEstrategias !== -1) {
    secaoAlvo = textoCompleto.substring(idxEstrategias, idxEstrategias + 3000);
    dbg('=== SEÇÃO "Estratégias" encontrada ===');
  } else if (idxComposicao !== -1) {
    secaoAlvo = textoCompleto.substring(idxComposicao, idxComposicao + 3000);
    dbg('=== SEÇÃO "COMPOSIÇÃO" encontrada ===');
  } else {
    dbg('⚠️ Seção "Estratégias" ou "COMPOSIÇÃO" não encontrada! Buscando em todo o texto...');
  }
  
  dbg('Trecho da seção alvo:');
  dbg(secaoAlvo.substring(0, 1500));
  
  function extrairPctAdaptativo(nomeBusca, variacoesExtras = []) {
    const variacoes = [
      nomeBusca,
      nomeBusca.replace(/\s+/g, '\\s*'),
      ...variacoesExtras
    ];
    
    if (nomeBusca === 'Inflação') {
      variacoes.push('In\\s*fl\\s*ação', 'In\\s*fl\\s*ação', 'In fl ação');
    }
    
    for (const variacao of variacoes) {
      const regex = new RegExp(variacao + '\\s*\\(\\s*(\\d{1,3})\\s*,\\s*(\\d{2})\\s*%\\)', 'i');
      const match = secaoAlvo.match(regex);
      
      if (match) {
        const valor = parseFloat(match[1] + '.' + match[2]);
        dbg(`✅ ${nomeBusca}: ${valor}%`);
        return valor;
      }
    }
    
    const nomeAproximado = nomeBusca.replace(/\s+/g, '');
    const regexFinal = new RegExp('([A-Za-zÀ-ÖØ-öø-ÿ\\s]*' + nomeAproximado + '[A-Za-zÀ-ÖØ-öø-ÿ\\s]*)\\s*\\(\\s*(\\d{1,3})\\s*,\\s*(\\d{2})\\s*%\\)', 'i');
    const matchFinal = secaoAlvo.match(regexFinal);
    
    if (matchFinal) {
      const valor = parseFloat(matchFinal[2] + '.' + matchFinal[3]);
      dbg(`✅ ${nomeBusca}: ${valor}% (encontrado por aproximação)`);
      return valor;
    }
    
    dbg(`❌ ${nomeBusca}: não encontrado`);
    return null;
  }
  
  const pctPos = extrairPctAdaptativo('Pós Fixado');
  const pctPre = extrairPctAdaptativo('Pré Fixado');
  const pctInf = extrairPctAdaptativo('Inflação', ['In fl ação', 'Inflação']);
  const pctMulti = extrairPctAdaptativo('Multimercado');
  const pctRV = extrairPctAdaptativo('Renda Variável Brasil');
  const pctAlternativo = extrairPctAdaptativo('Alternativo');
  const pctRVGlobal = extrairPctAdaptativo('Renda Variável Global');
  const pctCaixa = extrairPctAdaptativo('Caixa');
  const pctProventos = extrairPctAdaptativo('Proventos');
  
  const res = {
    "Renda Fixa Pós": pctPos,
    "Renda Fixa Pré": pctPre,
    "Renda Fixa Inflação": pctInf,
    "Multiestratégia": pctMulti,
    "Renda Variável": pctRV,
    "Renda Fixa Global": 0,
    "Renda Variável Global": pctRVGlobal,
    "Alternativo": pctAlternativo,
    "Caixa": pctCaixa,
    "Proventos": pctProventos
  };
  
  let totalEncontrado = 0;
  for (let key in res) {
    if (res[key] !== null && res[key] > 0) totalEncontrado += res[key];
  }
  dbg(`\n📊 Total dos percentuais encontrados: ${totalEncontrado.toFixed(2)}%`);
  
  let patrimonio = 0;
  const patMatch = textoCompleto.match(/PATRIM[OÔ]NIO\s*TOTAL\s*BRUTO[:\s]*R\$\s*([\d\.]+,\d{2})/i);
  if (patMatch) {
    patrimonio = parseFloat(patMatch[1].replace(/\./g, '').replace(',', '.'));
    dbg(`💰 Patrimônio total encontrado: R$ ${patrimonio.toLocaleString('pt-BR')}`);
  } else {
    dbg('⚠️ Patrimônio total não encontrado no PDF');
  }
  
  return { res, patrimonio };
}

function renderInputs() {
  const container = document.getElementById('inputsAtual');
  container.innerHTML = '';
  CLASSES.forEach((classe, idx) => {
    const row = document.createElement('div');
    row.className = 'classe-row';
    row.innerHTML = `
      <div class="dot8 ${CORES[idx]}"></div>
      <span class="classe-nome">${classe}</span>
      <input class="classe-input" type="number" step="any" min="0" max="100" value="0" id="inp_${idx}">
      <span class="pct-label">%</span>
    `;
    container.appendChild(row);
    inputsMap[classe] = row.querySelector('input');
    inputsMap[classe].addEventListener('input', atualizarTotal);
  });
  atualizarTotal();
}

function renderAlvo() {
  const rec = PERFIS[perfilAtivo];
  document.getElementById('perfilLabel').textContent = perfilAtivo;
  const container = document.getElementById('tabelaAlvo');
  
  const classesAlvo = CLASSES.filter(c => c !== 'Caixa' && c !== 'Proventos');
  
  container.innerHTML = classesAlvo.map((c, i) => `
    <div class="alvo-row">
      <div class="dot8 ${CORES[CLASSES.indexOf(c)]}"></div>
      <span class="alvo-nome">${c}</span>
      <div class="alvo-bar-wrap"><div class="alvo-bar-fill" style="width:${rec[c]}%"></div></div>
      <span class="alvo-pct">${rec[c]}%</span>
    </div>
  `).join('');
}

function renderPerfis() {
  const icons = { Conservador: '🛡️', Moderado: '⚖️', Agressivo: '🚀' };
  const container = document.getElementById('perfisRow');
  container.innerHTML = Object.keys(PERFIS).map(p => `
    <button class="perfil-btn ${p === perfilAtivo ? 'ativo' : ''}" data-perfil="${p}">
      ${icons[p]} ${p}
    </button>
  `).join('');
  container.querySelectorAll('.perfil-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      perfilAtivo = btn.dataset.perfil;
      renderPerfis();
      renderAlvo();
      document.getElementById('resultArea').style.display = 'none';
    });
  });
}

function analisar() {
  let total = 0;
  const atual = {};
  CLASSES.forEach(c => {
    atual[c] = parseFloat(inputsMap[c]?.value || 0) || 0;
    total += atual[c];
  });
  
  if (Math.abs(total - 100) > 0.1) {
    setStatus(`Total deve ser 100% (atual: ${fmtPct(total)})`, 'err');
    return;
  }
  
  const alvo = PERFIS[perfilAtivo];
  let nManter = 0, nAlocar = 0, nRetirar = 0;
  
  const classesAnalise = CLASSES.filter(c => c !== 'Caixa' && c !== 'Proventos');
  
  const html = classesAnalise.map((c, idx) => {
    const diff = alvo[c] - atual[c];
    const valorMovimentar = Math.abs(diff * patrimonioTotal / 100);
    
    let badgeClass, label, valorClass;
    if (Math.abs(diff) < 0.05) {
      badgeClass = 'b-manter';
      label = '✓ Manter';
      valorClass = 'manter';
      nManter++;
    } else if (diff > 0) {
      badgeClass = 'b-alocar';
      label = `↑ Alocar +${fmtPct(diff)}`;
      valorClass = 'alocar';
      nAlocar++;
    } else {
      badgeClass = 'b-retirar';
      label = `↓ Retirar ${fmtPct(Math.abs(diff))}`;
      valorClass = 'retirar';
      nRetirar++;
    }
    
    const valorDisplay = Math.abs(diff) < 0.05 ? 'R$ 0,00' : fmtBRL(valorMovimentar);
    const corIndex = CLASSES.indexOf(c);
    
    return `
      <div class="rec-row">
        <div class="dot8 ${CORES[corIndex]}"></div>
        <span class="rec-nome">${c}</span>
        <span class="rec-nums">${fmtPct(atual[c])} → ${alvo[c]}%</span>
        <span class="rec-valor ${valorClass}">${valorDisplay}</span>
        <span class="badge ${badgeClass}">${label}</span>
      </div>
    `;
  }).join('');
  
  const totalCaixaProventos = (atual['Caixa'] || 0) + (atual['Proventos'] || 0);
  let observacao = '';
  if (totalCaixaProventos > 0.05) {
    observacao = `
      <div style="margin-top: 1rem; padding: 0.75rem; background: var(--blue-bg); border-radius: 8px; border-left: 3px solid var(--blue);">
        <strong style="color: var(--blue);">ℹ️ Observação:</strong> O cliente possui ${fmtPct(totalCaixaProventos)} em Caixa/Proventos. 
        Estes valores devem ser <strong>direcionados</strong> conforme as recomendações acima para ajustar a carteira aos percentuais-alvo.
      </div>
    `;
  }
  
  document.getElementById('listaRec').innerHTML = html + observacao;
  document.getElementById('resumoGrid').innerHTML = `
    <div class="resumo-item"><div class="resumo-label">Manter</div><div class="resumo-val" style="color:var(--amber)">${nManter}</div></div>
    <div class="resumo-item"><div class="resumo-label">Alocar</div><div class="resumo-val" style="color:var(--green)">${nAlocar}</div></div>
    <div class="resumo-item"><div class="resumo-label">Retirar</div><div class="resumo-val" style="color:var(--red)">${nRetirar}</div></div>
    <div class="resumo-item"><div class="resumo-label">Perfil</div><div class="resumo-val" style="color:var(--gold);font-size:14px">${perfilAtivo}</div></div>
  `;
  
  const area = document.getElementById('resultArea');
  area.style.display = 'block';
  area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

document.getElementById('btnToggleDebug').addEventListener('click', () => {
  const debugBox = document.getElementById('debugBox');
  const arrow = document.getElementById('debugArrow');
  debugBox.classList.toggle('show');
  arrow.classList.toggle('rotated');
});

document.getElementById('filePdf').addEventListener('change', function() {
  document.getElementById('fileName').textContent = this.files[0]?.name || 'Selecionar arquivo PDF...';
});

document.getElementById('btnImportar').addEventListener('click', async () => {
  const file = document.getElementById('filePdf').files[0];
  if (!file) { setStatus('Selecione um arquivo PDF primeiro.', 'err'); return; }
  clearDebug();
  document.getElementById('debugBox').classList.remove('show');
  document.getElementById('debugArrow').classList.remove('rotated');
  document.getElementById('patrimTag').classList.remove('show');
  document.getElementById('overlay').classList.add('show');
  try {
    const { res, patrimonio } = await extrairDadosPDF(file);
    patrimonioTotal = patrimonio;
    let encontrou = false;
    
    for (const classe of CLASSES) {
      if (res[classe] !== null && res[classe] > 0) {
        inputsMap[classe].value = res[classe].toFixed(2);
        encontrou = true;
      } else {
        inputsMap[classe].value = '0';
      }
    }
    atualizarTotal();
    
    if (encontrou) {
      setStatus('✅ PDF importado com sucesso!', 'ok');
      if (patrimonioTotal > 0) {
        document.getElementById('patrimVal').innerHTML = fmtBRL(patrimonioTotal);
        document.getElementById('patrimTag').classList.add('show');
      }
    } else {
      setStatus('❌ Não foi possível extrair os dados. Veja o debug.', 'err');
      document.getElementById('debugBox').classList.add('show');
      document.getElementById('debugArrow').classList.add('rotated');
    }
  } catch (e) {
    setStatus('Erro: ' + e.message, 'err'); 
    dbg('ERRO: ' + e.message);
    document.getElementById('debugBox').classList.add('show');
    document.getElementById('debugArrow').classList.add('rotated');
  } finally {
    document.getElementById('overlay').classList.remove('show');
  }
});

document.getElementById('btnLimpar').addEventListener('click', () => {
  CLASSES.forEach(c => { if (inputsMap[c]) inputsMap[c].value = '0'; });
  patrimonioTotal = 0;
  atualizarTotal();
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('status').classList.remove('show');
  document.getElementById('patrimTag').classList.remove('show');
  clearDebug();
  document.getElementById('debugBox').classList.remove('show');
  document.getElementById('debugArrow').classList.remove('rotated');
  document.getElementById('filePdf').value = '';
  document.getElementById('fileName').textContent = 'Selecionar arquivo PDF...';
});

document.getElementById('btnAnalisar').addEventListener('click', analisar);
document.getElementById('themeToggle').addEventListener('click', () => {
  const body = document.body;
  const btn = document.getElementById('themeToggle');
  if (body.classList.contains('light')) {
    body.classList.remove('light');
    localStorage.setItem('theme', 'dark');
    btn.textContent = '🌙';
  } else {
    body.classList.add('light');
    localStorage.setItem('theme', 'light');
    btn.textContent = '☀️';
  }
});

(function init() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeToggle').textContent = '☀️';
  }
  document.getElementById('hDate').textContent = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
  renderInputs(); renderPerfis(); renderAlvo();
})();
</script>
</body>
</html>
