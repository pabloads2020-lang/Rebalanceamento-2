<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebalanceador</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body>

<input type="file" id="filePdf">
<button onclick="importar()">Importar</button>

<pre id="debug"></pre>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function dbg(t){ document.getElementById("debug").textContent += t + "\n"; }

// 🔥 normalização (resolve inflação)
function normalizarTexto(s){
  return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
}

async function extrairDadosPDF(file){

  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;

  let raw = [];

  for (let p = 1; p <= pdf.numPages; p++) {
    const tc = await (await pdf.getPage(p)).getTextContent();
    tc.items.forEach(it => raw.push(it.str));
  }

  const T = raw.map(s => s.trim()).filter(s => s.length > 0);

  function lerPct(i){
    if (T[i] !== '(') return null;
    const a=T[i+1], b=T[i+3];
    if(!a || !b) return null;
    return parseFloat(a+"."+b);
  }

  const res = {};

  for (let i=0;i<T.length;i++){

    const token = normalizarTexto(T[i]);

    let destino=null;

    if(token.includes("pos fixado")) destino="Pós Fixado";
    else if(token.includes("pre fixado")) destino="Pré Fixado";
    else if(token.includes("infl")) destino="Inflação";
    else if(token.includes("multimercado")) destino="Multimercado";
    else if(token.includes("renda variavel")) destino="Renda Variável";

    if(!destino) continue;

    let pi=-1;
    for(let k=i;k<i+5;k++){
      if(T[k]=="("){pi=k;break;}
    }

    if(pi==-1) continue;

    const pct = lerPct(pi);
    if(!pct) continue;

    if(!res[destino]) res[destino]=0;
    res[destino]+=pct;

    dbg(destino+" -> "+pct+"%");
  }

  return res;
}

async function importar(){
  const file = document.getElementById("filePdf").files[0];
  if(!file) return;

  document.getElementById("debug").textContent="";

  const r = await extrairDadosPDF(file);

  console.log(r);
}
</script>

</body>
</html>
