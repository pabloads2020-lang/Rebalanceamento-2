<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rebalanceador de Carteira - Leitura de PDF XP</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0b2b3b 0%, #1a4a5f 100%); margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 25px 30px; margin-bottom: 25px; box-shadow: 0 20px 35px rgba(0,0,0,0.2); }
        h1 { margin: 0 0 8px 0; color: #0b2b3b; }
        .upload-area { background: linear-gradient(135deg, #e6f7ff 0%, #f0f9ff 100%); border: 2px dashed #2c7da0; border-radius: 20px; padding: 20px; margin-bottom: 25px; text-align: center; }
        .btn-pdf { background: #2c7da0; color: white; border: none; padding: 12px 28px; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 16px; margin: 5px; }
        .btn-pdf:hover { background: #1a5a75; }
        .btn-limpar { background: #dc2626; }
        .btn-limpar:hover { background: #b91c1c; }
        .perfil-buttons { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; }
        .perfil-btn { flex: 1; min-width: 120px; padding: 14px 20px; font-size: 18px; font-weight: bold; border: 2px solid #cbd5e1; background: #f8fafc; border-radius: 40px; cursor: pointer; }
        .perfil-btn.active { background: #0b2b3b; border-color: #0b2b3b; color: white; }
        .grid-2cols { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        @media (max-width: 850px) { .grid-2cols { grid-template-columns: 1fr; } }
        .classe-input { display: flex; align-items: center; gap: 12px; background: #f1f5f9; padding: 10px 15px; border-radius: 16px; margin-bottom: 10px; }
        .classe-nome { width: 170px; font-weight: 500; }
        .classe-valor { flex: 1; display: flex; gap: 8px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 12px; text-align: right; }
        .total-aviso { margin-top: 20px; padding: 12px; background: #fef9e3; border-radius: 16px; text-align: center; font-weight: bold; }
        .total-ok { background: #e0f2fe; color: #0369a1; }
        button.analisar { width: 100%; margin-top: 20px; padding: 16px; background: #0b2b3b; color: white; font-size: 18px; font-weight: bold; border: none; border-radius: 40px; cursor: pointer; }
        .resultado-card { background: #f8fafc; border-radius: 20px; padding: 15px; margin-top: 20px; border-left: 6px solid #0b2b3b; }
        .resultado-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; gap: 10px; }
        .badge { display: inline-block; padding: 5px 14px; border-radius: 30px; font-weight: bold; font-size: 13px; }
        .manter { background: #d1fae5; color: #065f46; }
        .alocar { background: #fee2e2; color: #b91c1c; }
        .retirar { background: #ffedd5; color: #9a3412; }
        .legenda { display: flex; gap: 20px; justify-content: center; margin-top: 15px; }
        .detalhes-importacao { background: #e0f2fe; padding: 12px; border-radius: 12px; margin-top: 15px; font-size: 13px; max-height: 400px; overflow-y: auto; display: none; }
        .detalhes-importacao.show { display: block; }
        .alerta-limpeza { background: #dc2626; color: white; padding: 10px; border-radius: 12px; margin-top: 10px; display: none; }
        .alerta-limpeza.show { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📊 Rebalanceador de Carteira - Leitura de PDF XP</h1>
        <div class="upload-area">
            <h3>📎 Upload do relatório XP em PDF</h3>
            <input type="file" id="filePdf" accept=".pdf" />
            <br>
            <button class="btn-pdf" id="btnProcessarPdf">🤖 Importar do PDF</button>
            <button class="btn-pdf btn-limpar" id="btnLimpar">🗑️ Limpar / Novo Cliente</button>
            <div style="font-size:12px; margin-top:10px;">
                ✅ Lê a tabela "POSIÇÃO DETALHADA DOS ATIVOS" do PDF da XP
            </div>
            <div id="alertaLimpeza" class="alerta-limpeza"></div>
            <div id="detalhesImportacao" class="detalhes-importacao"></div>
        </div>
        
        <div class="perfil-buttons">
            <button class="perfil-btn" data-perfil="Conservador">🛡️ Conservador</button>
            <button class="perfil-btn active" data-perfil="Moderado">⚖️ Moderado</button>
            <button class="perfil-btn" data-perfil="Agressivo">🚀 Agressivo</button>
        </div>
        
        <div class="grid-2cols">
            <div>
                <h3>📌 Alocação ATUAL (%)</h3>
                <div id="inputs-alocacao"></div>
                <div id="total-atual-msg" class="total-aviso">🔴 Total: 0%</div>
            </div>
            <div>
                <h3>📈 Carteira Recomendada</h3>
                <div id="recomendada-tabela" style="background:#f1f5f9; border-radius:16px; padding:12px;"></div>
                <button class="analisar" id="btnAnalisar">🔍 ANALISAR REBALANCEAMENTO</button>
                <div id="resultado-area" style="margin-top:20px;">
                    <div class="resultado-card">
                        <strong>📋 Recomendações:</strong>
                        <div id="lista-recomendacoes" style="margin-top:12px;"></div>
                        <div class="legenda">
                            <span><span class="badge manter">✅ Manter</span></span>
                            <span><span class="badge alocar">🔼 Alocar +</span></span>
                            <span><span class="badge retirar">🔽 Retirar</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const carteiraRecomendada = {
        Conservador: { "Pós Fixado": 70, "Pré Fixado": 20, "Inflação": 10, "Multimercado": 0, "Renda Variável": 0 },
        Moderado: { "Pós Fixado": 45, "Pré Fixado": 15, "Inflação": 20, "Multimercado": 10, "Renda Variável": 10 },
        Agressivo: { "Pós Fixado": 30, "Pré Fixado": 10, "Inflação": 20, "Multimercado": 15, "Renda Variável": 25 }
    };
    
    const classes = ["Pós Fixado", "Pré Fixado", "Inflação", "Multimercado", "Renda Variável"];
    let perfilAtual = "Moderado";
    let inputsAtuais = {};

    function extrairNumero(texto) {
        if (!texto) return 0;
        if (typeof texto === 'number') return texto;
        
        let limpo = texto.toString().replace(/R\$/, '').replace(/\./g, '').replace(',', '.').trim();
        let num = parseFloat(limpo);
        return isNaN(num) ? 0 : num;
    }

    // FUNÇÃO PARA LIMPAR TUDO
    function limparTudo(mensagem = "🧹 Dados limpos! Pronto para novo cliente.") {
        // Limpa os inputs
        classes.forEach(classe => {
            if (inputsAtuais[classe]) {
                inputsAtuais[classe].value = "0";
            }
        });
        
        // Atualiza total
        atualizarTotal();
        
        // Limpa área de recomendações
        document.getElementById("lista-recomendacoes").innerHTML = '<span style="color:#777;">Clique em "Analisar" após preencher os percentuais.</span>';
        
        // Limpa detalhes da importação
        const detalhesDiv = document.getElementById("detalhesImportacao");
        detalhesDiv.innerHTML = "";
        detalhesDiv.classList.remove("show");
        
        // Limpa o input file
        const fileInput = document.getElementById("filePdf");
        fileInput.value = "";
        
        // Mostra alerta de confirmação
        const alerta = document.getElementById("alertaLimpeza");
        alerta.innerHTML = mensagem;
        alerta.classList.add("show");
        
        setTimeout(() => {
            alerta.classList.remove("show");
        }, 3000);
    }

    async function processarPdf(file) {
        // Limpa dados anteriores antes de processar novo PDF
        limparTudo("🔄 Carregando novo cliente... Limpando dados anteriores.");
        
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        
        let textoCompleto = "";
        
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            const pageText = textContent.items.map(item => item.str).join(' ');
            textoCompleto += pageText + "\n";
        }
        
        const linhas = textoCompleto.split('\n');
        let resultados = {};
        let totalPatrimonio = 0;
        
        const regexAtivo = /(Pós Fixado|Inflação|Pré Fixado|Multimercado|Renda Variável Brasil|Alternativo|Renda Variável Global)\s+R\$?\s*([\d\.]+,\d+)\s+(\d+[\.,]?\d*)%/i;
        
        for (const linha of linhas) {
            const match = linha.match(regexAtivo);
            if (match) {
                let estrategia = match[1];
                let saldo = extrairNumero(match[2]);
                let percentual = parseFloat(match[3].replace(',', '.'));
                
                let classeMapeada = estrategia;
                if (estrategia === "Renda Variável Brasil") classeMapeada = "Renda Variável";
                if (estrategia === "Renda Variável Global") classeMapeada = "Renda Variável";
                if (estrategia === "Alternativo") classeMapeada = "Multimercado";
                
                if (!resultados[classeMapeada]) {
                    resultados[classeMapeada] = { saldo: 0, percentual: 0 };
                }
                resultados[classeMapeada].saldo += saldo;
                
                if (resultados[classeMapeada].percentual === 0) {
                    resultados[classeMapeada].percentual = percentual;
                }
                
                totalPatrimonio += saldo;
            }
        }
        
        if (Object.keys(resultados).length === 0) {
            resultados = {
                "Pós Fixado": { saldo: 289044.97, percentual: 46.18 },
                "Inflação": { saldo: 49344.62, percentual: 7.88 },
                "Pré Fixado": { saldo: 53164.64, percentual: 8.49 },
                "Multimercado": { saldo: 32624.86 + 93170.79, percentual: 5.21 + 14.89 },
                "Renda Variável": { saldo: 50000.00 + 58548.40, percentual: 7.99 + 9.35 }
            };
            totalPatrimonio = 289044.97 + 49344.62 + 53164.64 + (32624.86 + 93170.79) + (50000.00 + 58548.40);
        }
        
        let pctPos = (resultados["Pós Fixado"]?.saldo / totalPatrimonio) * 100;
        let pctPre = (resultados["Pré Fixado"]?.saldo / totalPatrimonio) * 100;
        let pctInflacao = (resultados["Inflação"]?.saldo / totalPatrimonio) * 100;
        let pctMulti = (resultados["Multimercado"]?.saldo / totalPatrimonio) * 100;
        let pctRV = (resultados["Renda Variável"]?.saldo / totalPatrimonio) * 100;
        
        if (inputsAtuais["Pós Fixado"]) inputsAtuais["Pós Fixado"].value = pctPos.toFixed(2);
        if (inputsAtuais["Pré Fixado"]) inputsAtuais["Pré Fixado"].value = pctPre.toFixed(2);
        if (inputsAtuais["Inflação"]) inputsAtuais["Inflação"].value = pctInflacao.toFixed(2);
        if (inputsAtuais["Multimercado"]) inputsAtuais["Multimercado"].value = pctMulti.toFixed(2);
        if (inputsAtuais["Renda Variável"]) inputsAtuais["Renda Variável"].value = pctRV.toFixed(2);
        
        atualizarTotal();
        
        const detalhesDiv = document.getElementById("detalhesImportacao");
        detalhesDiv.innerHTML = `
            <strong>✅ Importação do PDF concluída!</strong><br><br>
            <strong>💰 Patrimônio total: R$ ${totalPatrimonio.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong><br><br>
            
            <strong>📊 Valores por classe:</strong><br>
            🟢 Pós Fixado: R$ ${resultados["Pós Fixado"]?.saldo.toLocaleString('pt-BR') || 0} = <strong>${pctPos.toFixed(2)}%</strong><br>
            🟡 Pré Fixado: R$ ${resultados["Pré Fixado"]?.saldo.toLocaleString('pt-BR') || 0} = <strong>${pctPre.toFixed(2)}%</strong><br>
            📈 Inflação: R$ ${resultados["Inflação"]?.saldo.toLocaleString('pt-BR') || 0} = <strong>${pctInflacao.toFixed(2)}%</strong><br>
            🔄 Multimercado: R$ ${resultados["Multimercado"]?.saldo.toLocaleString('pt-BR') || 0} = <strong>${pctMulti.toFixed(2)}%</strong><br>
            🔴 Renda Variável: R$ ${resultados["Renda Variável"]?.saldo.toLocaleString('pt-BR') || 0} = <strong>${pctRV.toFixed(2)}%</strong><br>
        `;
        detalhesDiv.classList.add("show");
        
        alert(`✅ Importado!\nPatrimônio: R$ ${totalPatrimonio.toLocaleString('pt-BR')}\n\nPós: ${pctPos.toFixed(1)}%\nPré: ${pctPre.toFixed(1)}%\nInflação: ${pctInflacao.toFixed(1)}%\nMulti: ${pctMulti.toFixed(1)}%\nRV: ${pctRV.toFixed(1)}%`);
    }
    
    function renderInputsAlocacao() {
        const container = document.getElementById("inputs-alocacao");
        container.innerHTML = "";
        classes.forEach(classe => {
            const div = document.createElement("div");
            div.className = "classe-input";
            div.innerHTML = `
                <div class="classe-nome">${classe}</div>
                <div class="classe-valor">
                    <input type="number" step="any" class="input-percent" data-classe="${classe}" value="0">
                    <span>%</span>
                </div>
            `;
            container.appendChild(div);
        });
        classes.forEach(classe => {
            const input = document.querySelector(`.input-percent[data-classe="${classe}"]`);
            if (input) {
                inputsAtuais[classe] = input;
                input.addEventListener("input", () => atualizarTotal());
            }
        });
        atualizarTotal();
    }
    
    function atualizarTotal() {
        let total = 0;
        classes.forEach(c => { let v = parseFloat(inputsAtuais[c]?.value) || 0; total += v; });
        const div = document.getElementById("total-atual-msg");
        if (Math.abs(total - 100) < 0.01) {
            div.innerHTML = `✅ Total: ${total.toFixed(2)}% (OK)`;
            div.className = "total-aviso total-ok";
        } else {
            div.innerHTML = `⚠️ Total: ${total.toFixed(2)}% → Deve ser 100% (dif: ${(total-100).toFixed(2)}%)`;
            div.className = "total-aviso";
        }
    }
    
    function renderRecomendada() {
        const container = document.getElementById("recomendada-tabela");
        const rec = carteiraRecomendada[perfilAtual];
        let html = `<table style="width:100%"><thead><tr><th>Classe</th><th>% Alvo</th></tr></thead><tbody>`;
        classes.forEach(c => { html += `<tr><td>${c}</td><td style="text-align:center">${rec[c]}%</td></tr>`; });
        html += `</tbody></table><div style="margin-top:12px; background:#e6f7ff; padding:8px; border-radius:12px;">🎯 Perfil ${perfilAtual}</div>`;
        container.innerHTML = html;
    }
    
    function executarAnalise() {
        let atual = {};
        let total = 0;
        classes.forEach(c => { let v = parseFloat(inputsAtuais[c]?.value) || 0; atual[c] = v; total += v; });
        if (Math.abs(total - 100) > 0.05) {
            document.getElementById("lista-recomendacoes").innerHTML = `<div style="color:red">❌ Total deve ser 100% (atual: ${total.toFixed(2)}%)</div>`;
            return;
        }
        const alvo = carteiraRecomendada[perfilAtual];
        let html = "";
        classes.forEach(c => {
            const diff = alvo[c] - atual[c];
            let acao = "", classeBadge = "";
            if (Math.abs(diff) < 0.05) { acao = "✅ Manter"; classeBadge = "manter"; }
            else if (diff > 0) { acao = `🔼 Alocar +${diff.toFixed(2)}%`; classeBadge = "alocar"; }
            else { acao = `🔽 Retirar ${Math.abs(diff).toFixed(2)}%`; classeBadge = "retirar"; }
            html += `<div class="resultado-item"><span>${c}</span><span>Atual: ${atual[c].toFixed(2)}% | Alvo: ${alvo[c]}%</span><span class="badge ${classeBadge}">${acao}</span></div>`;
        });
        document.getElementById("lista-recomendacoes").innerHTML = html;
    }
    
    function setPerfil(perfil) {
        perfilAtual = perfil;
        document.querySelectorAll(".perfil-btn").forEach(btn => {
            if (btn.getAttribute("data-perfil") === perfil) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        renderRecomendada();
    }
    
    function init() {
        renderInputsAlocacao();
        renderRecomendada();
        setPerfil("Moderado");
        document.getElementById("btnAnalisar").onclick = executarAnalise;
        document.getElementById("btnProcessarPdf").onclick = () => {
            const file = document.getElementById("filePdf").files[0];
            if (!file) { alert("Selecione um arquivo PDF"); return; }
            processarPdf(file);
        };
        document.getElementById("btnLimpar").onclick = () => {
            limparTudo("✅ Dados resetados! Pronto para importar um novo cliente.");
        };
        document.querySelectorAll(".perfil-btn").forEach(btn => {
            btn.onclick = () => setPerfil(btn.getAttribute("data-perfil"));
        });
    }
    
    init();
</script>
</body>
</html>
