<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebalanceador de Carteira · XP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{--bg:#0e1117;--bg2:#161b25;--bg3:#1c2333;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--gold:#f5c842;--gold2:#e0a800;--text:#e8eaf0;--text2:#8b93a7;--text3:#555e72;--green:#2ecc71;--green-bg:rgba(46,204,113,0.12);--red:#e74c3c;--red-bg:rgba(231,76,60,0.12);--amber:#f39c12;--amber-bg:rgba(243,156,18,0.12);--blue:#3498db;--blue-bg:rgba(52,152,219,0.12)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);margin:0;padding:0;min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600}
.dot{width:28px;height:28px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000}
.main{max-width:1100px;margin:0 auto;padding:2rem}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.upload-row{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.file-label{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1.5px dashed var(--border2);border-radius:8px;padding:9px 14px;cursor:pointer;font-size:13px;color:var(--text2);flex:1;min-width:180px}
#filePdf{display:none}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:var(--gold2)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.status{display:none;padding:10px;border-radius:8px;font-size:13px;margin-top:10px}
.status.show{display:block}
.status-ok{background:var(--green-bg);color:var(--green);border:1px solid rgba(46,204,113,.2)}
.status-err{background:var(--red-bg);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.perfis-row{display:flex;gap:8px;margin-bottom:1.5rem}
.perfil-btn{flex:1;padding:10px;border-radius:10px;font-size:13px;cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text2)}
.perfil-btn.ativo{background:var(--gold);color:#000;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.classe-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.classe-input{width:80px;padding:6px;text-align:right;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace}
.total-bar{display:flex;justify-content:space-between;padding:10px;border-radius:8px;margin-top:10px;font-weight:600}
.total-ok{background:var(--green-bg);color:var(--green)}.total-err{background:var(--red-bg);color:var(--red)}
.alvo-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.btn-full{width:100%;padding:12px;margin-top:1rem;background:var(--gold);border:none;border-radius:8px;font-weight:600;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;color:#fff}
.overlay.show{display:flex}
.patrim-tag{display:none;margin-top:10px;color:var(--gold);font-size:13px;font-weight:600}
.patrim-tag.show{display:block}
.debug-box{display:none;background:#000;color:#0f0;padding:10px;font-family:monospace;font-size:10px;margin-top:10px;max-height:100px;overflow-y:auto}
</style>
</head>
<body>

<div class="overlay" id="overlay">Processando PDF...</div>

<header class="header">
  <div class="header-logo"><div class="dot">XP</div>Rebalanceador</div>
  <div id="hDate" style="font-size:12px;color:var(--text3)"></div>
</header>

<main class="main">
  <div class="card">
    <div class="card-title">Importar Carteira</div>
    <div class="upload-row">
      <label class="file-label" for="filePdf"><span id="fileName">Selecionar PDF da XP</span></label>
      <input type="file" id="filePdf" accept=".pdf">
      <button class="btn btn-gold" id="btnImportar">Importar</button>
      <button class="btn btn-ghost" id="btnLimpar">Limpar</button>
    </div>
    <div id="status" class="status"></div>
    <div id="patrimTag" class="patrim-tag"></div>
    <div id="debugBox" class="debug-box"></div>
  </div>

  <div class="perfis-row" id="perfisRow"></div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">Alocação Atual</div>
      <div id="inputsAtual"></div>
      <div id="totalBar" class="total-bar total-err">
        <span>Total</span><span id="totalVal">0,00%</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Alvo: <span id="perfilLabel">Moderado</span></div>
      <div id="tabelaAlvo"></div>
      <button class="btn btn-full" id="btnAnalisar">Analisar Rebalanceamento</button>
    </div>
  </div>

  <div id="resultArea" class="card" style="display:none;margin-top:1.5rem">
    <div class="card-title">Resultado</div>
    <div id="listaRec"></div>
  </div>
</main>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const PERFIS = {
  Conservador: { "Pós Fixado": 85, "Pré Fixado": 15, "Inflação": 0, "Multimercado": 0, "Renda Variável": 0 },
  Moderado: { "Pós Fixado": 54, "Pré Fixado": 13, "Inflação": 20, "Multimercado": 5, "Renda Variável": 8 },
  Agressivo: { "Pós Fixado": 44, "Pré Fixado": 15, "Inflação": 24, "Multimercado": 5, "Renda Variável": 12 }
};

const CLASSES = ["Pós Fixado", "Pré Fixado", "Inflação", "Multimercado", "Renda Variável"];
let perfilAtivo = "Moderado";
let inputsMap = {};

function clean(s) { 
    return s.normalize('NFD').replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/[()]/g, ""); 
}

async function extrairDadosPDF(file) {
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  let tokens = [];

  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const tc = await page.getTextContent();
    tc.items.forEach(it => {
        if(it.str.trim()) tokens.push(it.str.trim());
    });
  }

  const res = {};
  const mapeamento = [
    { id: "Pós Fixado", keys: ["pos fixado"] },
    { id: "Pré Fixado", keys: ["pre fixado"] },
    { id: "Inflação", keys: ["inflacao"] },
    { id: "Multimercado", keys: ["multimercado"] },
    { id: "Renda Variável", keys: ["renda variavel", "acoes"] }
  ];

  tokens.forEach((t, i) => {
    const tClean = clean(t);
    mapeamento.forEach(m => {
      if (m.keys.some(k => tClean.includes(k)) && !res[m.id]) {
        // Encontrou a classe, agora caça o próximo % nos próximos 15 tokens
        for (let k = i + 1; k < i + 15; k++) {
          if (tokens[k] && tokens[k].includes('%')) {
            const num = tokens[k].match(/(\d+[,.]\d+)/);
            if (num) {
                res[m.id] = { pct: parseFloat(num[1].replace(',', '.')) };
                break;
            }
          }
        }
      }
    });
  });

  // Busca do Patrimônio Bruto
  let patrimonio = 0;
  tokens.forEach((t, i) => {
      if (clean(t) === "patrimonio" && clean(tokens[i+1]) === "total") {
          for (let k = i; k < i+10; k++) {
              if (tokens[k].includes('R$')) {
                  let v = tokens[k].replace('R$', '').trim() || tokens[k+1];
                  patrimonio = parseFloat(v.replace(/\./g, '').replace(',', '.'));
                  break;
              }
          }
      }
  });

  return { res, patrimonio };
}

function renderInputs() {
  const c = document.getElementById('inputsAtual'); c.innerHTML = '';
  CLASSES.forEach(cl => {
    const row = document.createElement('div'); row.className = 'classe-row';
    row.innerHTML = `<span style="flex:1;font-size:13px">${cl}</span><input class="classe-input" type="number" step="any" value="0"><span>%</span>`;
    c.appendChild(row);
    inputsMap[cl] = row.querySelector('input');
    inputsMap[cl].addEventListener('input', () => {
        let t = 0; CLASSES.forEach(x => t += parseFloat(inputsMap[x].value || 0));
        document.getElementById('totalVal').textContent = t.toFixed(2).replace('.', ',') + '%';
        document.getElementById('totalBar').className = 'total-bar ' + (Math.abs(t-100) < 0.5 ? 'total-ok' : 'total-err');
    });
  });
}

function renderAlvo() {
  const rec = PERFIS[perfilAtivo];
  document.getElementById('perfilLabel').textContent = perfilAtivo;
  document.getElementById('tabelaAlvo').innerHTML = CLASSES.map(c => `
    <div class="alvo-row"><span>${c}</span><strong>${rec[c]}%</strong></div>`).join('');
}

document.getElementById('btnImportar').addEventListener('click', async () => {
  const file = document.getElementById('filePdf').files[0];
  if (!file) return;
  document.getElementById('overlay').classList.add('show');
  try {
    const { res, patrimonio } = await extrairDadosPDF(file);
    let encontrados = 0;
    CLASSES.forEach(c => {
      if (res[c]) {
        inputsMap[c].value = res[c].pct;
        encontrados++;
      }
    });
    if (encontrados > 0) {
      document.getElementById('status').innerHTML = "Importado!";
      document.getElementById('status').className = "status show status-ok";
      if (patrimonio) document.getElementById('patrimTag').innerHTML = "Patrimônio: R$ " + patrimonio.toLocaleString('pt-BR');
      document.getElementById('patrimTag').classList.add('show');
    } else {
      document.getElementById('status').innerHTML = "Não foi possível ler as classes. Verifique o PDF.";
      document.getElementById('status').className = "status show status-err";
    }
  } catch (e) { alert("Erro: " + e.message); }
  document.getElementById('overlay').classList.remove('show');
});

document.getElementById('btnAnalisar').addEventListener('click', () => {
    const alvo = PERFIS[perfilAtivo];
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('listaRec').innerHTML = CLASSES.map(c => {
        const atual = parseFloat(inputsMap[c].value || 0);
        const diff = alvo[c] - atual;
        const acao = diff > 0.5 ? '<span style="color:var(--red)">ALOCAR</span>' : (diff < -0.5 ? '<span style="color:var(--amber)">RETIRAR</span>' : '<span style="color:var(--green)">MANTER</span>');
        return `<div style="padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;display:flex;justify-content:space-between">
            <span>${c} (${atual}% → ${alvo[c]}%)</span> <strong>${acao}</strong>
        </div>`;
    }).join('');
});

document.getElementById('filePdf').addEventListener('change', (e) => {
    document.getElementById('fileName').textContent = e.target.files[0].name;
});

renderInputs(); renderAlvo();
document.getElementById('perfisRow').innerHTML = Object.keys(PERFIS).map(p => `<button class="perfil-btn ${p === perfilAtivo ? 'ativo' : ''}" onclick="perfilAtivo='${p}'; location.reload();">${p}</button>`).join('');
</script>
</body>
</html>
