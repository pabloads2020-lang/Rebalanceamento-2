<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebalanceador de Carteira · XP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg: #0e1117; --bg2: #161b25; --bg3: #1c2333;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --gold: #f5c842; --gold2: #e0a800;
  --text: #e8eaf0; --text2: #8b93a7; --text3: #555e72;
  --green: #2ecc71; --green-bg: rgba(46,204,113,0.12);
  --red: #e74c3c; --red-bg: rgba(231,76,60,0.12);
  --amber: #f39c12; --amber-bg: rgba(243,156,18,0.12);
  --blue: #3498db; --blue-bg: rgba(52,152,219,0.12);
  --header-bg: #161b25; --header-border: rgba(255,255,255,0.07);
  --card-bg: #161b25; --card-border: rgba(255,255,255,0.07);
  --input-bg: #1c2333; --input-border: rgba(255,255,255,0.13);
  --alvo-bar-bg: #1c2333; --resumo-item-bg: #1c2333;
  --debug-bg: #1c2333; --overlay-bg: rgba(14,17,23,.88);
  --footer-border: rgba(255,255,255,0.07);
}
body.light {
  --bg: #f5f7fa; --bg2: #ffffff; --bg3: #f0f2f5;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.12);
  --gold: #d4a017; --gold2: #b8860b;
  --text: #1a1a2e; --text2: #4a5568; --text3: #718096;
  --green: #27ae60; --green-bg: rgba(39,174,96,0.1);
  --red: #e74c3c; --red-bg: rgba(231,76,60,0.1);
  --amber: #e67e22; --amber-bg: rgba(230,126,34,0.1);
  --header-bg: #ffffff; --header-border: rgba(0,0,0,0.08);
  --card-bg: #ffffff; --card-border: rgba(0,0,0,0.08);
  --input-bg: #ffffff; --input-border: #e2e8f0;
  --alvo-bar-bg: #e2e8f0; --resumo-item-bg: #f7fafc;
  --debug-bg: #f7fafc; --overlay-bg: rgba(255,255,255,.95);
  --footer-border: rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { background: var(--header-bg); border-bottom: 1px solid var(--header-border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
.dot { width: 28px; height: 28px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #000; }
.header-right { display: flex; align-items: center; gap: 1rem; }
.header-date { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }
.theme-toggle { background: var(--bg3); border: 1px solid var(--border2); border-radius: 30px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
.theme-toggle:hover { border-color: var(--gold); transform: scale(1.05); }
.main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
.card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
.card-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
.upload-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
.file-label { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1.5px dashed var(--border2); border-radius: 8px; padding: 9px 14px; cursor: pointer; font-size: 13px; color: var(--text2); flex: 1; min-width: 180px; }
.file-label:hover { border-color: var(--gold); color: var(--gold); }
#filePdf { display: none; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; white-space: nowrap; }
.btn-gold { background: var(--gold); color: #000; }
.btn-gold:hover { background: var(--gold2); transform: translateY(-1px); }
.btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.btn-full { background: var(--gold); color: #000; font-size: 14px; font-weight: 600; width: 100%; padding: 12px; justify-content: center; margin-top: 1rem; border-radius: 10px; }
.btn-full:hover { background: var(--gold2); transform: translateY(-1px); }
.status { display: none; align-items: center; gap: 8px; padding: 9px 13px; border-radius: 8px; font-size: 13px; margin-top: 0.75rem; }
.status.show { display: flex; }
.status-ok { background: var(--green-bg); color: var(--green); border: 1px solid rgba(46, 204, 113, 0.25); }
.status-err { background: var(--red-bg); color: var(--red); border: 1px solid rgba(231, 76, 60, 0.25); }
.patrim-tag { display: none; align-items: center; gap: 6px; margin-top: 0.6rem; background: rgba(245, 200, 66, 0.1); border: 1px solid rgba(245, 200, 66, 0.25); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 500; color: var(--gold); width: fit-content; }
.patrim-tag.show { display: flex; }
.perfis-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
.perfil-btn { flex: 1; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); }
.perfil-btn:hover { border-color: var(--gold); color: var(--gold); }
.perfil-btn.ativo { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 600; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
@media (max-width: 700px) { .grid2 { grid-template-columns: 1fr; } }
.classe-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.classe-row:last-of-type { border-bottom: none; }
.dot8 { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.c0 { background: #f5c842; }
.c1 { background: #3498db; }
.c2 { background: #2ecc71; }
.c3 { background: #9b59b6; }
.c4 { background: #e74c3c; }
.classe-nome { flex: 1; font-size: 13px; }
.classe-input { width: 72px; padding: 6px 10px; text-align: right; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 7px; color: var(--text); font-size: 13px; font-family: 'DM Mono', monospace; }
.classe-input:focus { outline: none; border-color: var(--gold); }
.total-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; margin-top: 0.75rem; }
.total-ok { background: var(--green-bg); color: var(--green); border: 1px solid rgba(46, 204, 113, 0.2); }
.total-err { background: var(--red-bg); color: var(--red); border: 1px solid rgba(231, 76, 60, 0.2); }
.alvo-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.alvo-row:last-of-type { border-bottom: none; }
.alvo-nome { flex: 1; font-size: 13px; }
.alvo-bar-wrap { width: 60px; height: 4px; background: var(--alvo-bar-bg); border-radius: 2px; overflow: hidden; }
.alvo-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; }
.alvo-pct { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--gold); min-width: 36px; text-align: right; }
.rec-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.rec-nome { flex: 1; font-size: 13px; min-width: 100px; }
.rec-nums { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.b-manter { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(243, 156, 18, 0.3); }
.b-alocar { background: var(--green-bg); color: var(--green); border: 1px solid rgba(46, 204, 113, 0.3); }
.b-retirar { background: var(--red-bg); color: var(--red); border: 1px solid rgba(231, 76, 60, 0.3); }
.resumo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
@media (max-width: 500px) { .resumo-grid { grid-template-columns: repeat(2, 1fr); } }
.resumo-item { background: var(--resumo-item-bg); border-radius: 8px; padding: 0.75rem; text-align: center; }
.resumo-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.resumo-val { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; }
.legenda { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
.legenda-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); }
.debug-box { display: none; background: var(--debug-bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); max-height: 300px; overflow-y: auto; margin-top: 0.75rem; white-space: pre-wrap; line-height: 1.7; }
.debug-box.show { display: block; }
.overlay { display: none; position: fixed; inset: 0; background: var(--overlay-bg); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
.overlay.show { display: flex; }
.spin { width: 40px; height: 40px; border: 3px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: rot 0.8s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }
.footer { text-align: center; font-size: 11px; color: var(--text3); padding: 2rem; border-top: 1px solid var(--footer-border); margin-top: 1rem; }
</style>
</head>
<body>

<div class="overlay" id="overlay"><div class="spin"></div><div class="spin-text">Processando PDF...</div></div>

<header class="header">
  <div class="header-logo"><div class="dot">XP</div>Rebalanceador de Carteira</div>
  <div class="header-right">
    <div class="header-date" id="hDate"></div>
    <button class="theme-toggle" id="themeToggle" title="Alternar modo claro/escuro">🌙</button>
  </div>
</header>

<main class="main">
  <div class="card">
    <div class="card-title">Importar relatório XP (PDF)</div>
    <div class="upload-row">
      <label class="file-label" for="filePdf"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><span id="fileName">Selecionar arquivo PDF...</span></label>
      <input type="file" id="filePdf" accept=".pdf">
      <button class="btn btn-gold" id="btnImportar">Importar PDF</button>
      <button class="btn btn-ghost" id="btnLimpar">Limpar</button>
    </div>
    <div id="status" class="status"></div>
    <div id="patrimTag" class="patrim-tag"><span id="patrimVal"></span></div>
    <div id="debugBox" class="debug-box"></div>
  </div>

  <div class="perfis-row" id="perfisRow"></div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">Alocação atual</div>
      <div id="inputsAtual"></div>
      <div id="totalBar" class="total-bar total-err"><span>Total</span><span id="totalVal">0,00%</span></div>
    </div>
    <div class="card">
      <div class="card-title">Carteira recomendada · <span id="perfilLabel" style="color:var(--gold)">Moderado</span></div>
      <div id="tabelaAlvo"></div>
      <button class="btn btn-full" id="btnAnalisar">Analisar rebalanceamento</button>
    </div>
  </div>

  <div id="resultArea" class="card fade-in" style="display:none">
    <div class="card-title">Recomendações de rebalanceamento</div>
    <div id="listaRec"></div>
    <div class="resumo-grid" id="resumoGrid"></div>
    <div class="legenda">
      <div class="legenda-item"><div class="dot8" style="background:var(--amber)"></div>Manter</div>
      <div class="legenda-item"><div class="dot8" style="background:var(--green)"></div>Alocar</div>
      <div class="legenda-item"><div class="dot8" style="background:var(--red)"></div>Retirar</div>
    </div>
  </div>
</main>

<footer class="footer">Material informativo — não constitui recomendação de investimento.</footer>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const PERFIS = {
  Conservador: { "Pós Fixado": 85, "Pré Fixado": 15, "Inflação": 0, "Multimercado": 0, "Renda Variável": 0 },
  Moderado: { "Pós Fixado": 54, "Pré Fixado": 13, "Inflação": 20, "Multimercado": 5, "Renda Variável": 8 },
  Agressivo: { "Pós Fixado": 44, "Pré Fixado": 15, "Inflação": 24, "Multimercado": 5, "Renda Variável": 12 }
};

const CLASSES = ["Pós Fixado", "Pré Fixado", "Inflação", "Multimercado", "Renda Variável"];
const CORES = ["c0","c1","c2","c3","c4"];

let perfilAtivo = "Moderado";
let inputsMap = {};

function fmtPct(v) { return v.toFixed(2).replace('.', ',') + ' %'; }
function fmtBRL(v) { return 'R$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits: 2}); }
function setStatus(msg, tipo) { const el = document.getElementById('status'); el.innerHTML = msg; el.className = 'status show status-' + tipo; setTimeout(() => el.classList.remove('show'), 4000); }
function dbg(txt) { const el = document.getElementById('debugBox'); el.classList.add('show'); el.textContent += txt + '\n'; }
function atualizarTotal() {
  let t = 0;
  CLASSES.forEach(c => { t += parseFloat(inputsMap[c]?.value || 0) || 0; });
  document.getElementById('totalVal').textContent = fmtPct(t);
  document.getElementById('totalBar').className = 'total-bar ' + (Math.abs(t - 100) < 0.1 ? 'total-ok' : 'total-err');
}

async function extrairDadosPDF(file) {
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  
  let textoCompleto = '';
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const tc = await page.getTextContent();
    const pageText = tc.items.map(item => item.str).join(' ');
    textoCompleto += pageText + '\n';
    dbg(`📄 Página ${p}: "${pageText.substring(0, 80)}..."`);
  }
  
  // ===== EXTRAÇÃO ESPECIAL PARA INFLAÇÃO (palavra quebrada) =====
  // Padrão encontrado: "In fl ação   ( 20 , 90 %)"
  function extrairInfeccaoEspecial(texto) {
    // Variações possíveis:
    // "Inflação (20,90%)" normal
    // "In fl ação (20,90%)" com espaços
    // "Inﬂação" com caractere especial
    // "In fl ação ( 20 , 90 %)" com espaços nos números
    
    const padroes = [
      /Inflação\s*\((\d{1,3},\d{2})%\)/i,
      /Inflação\s*\(\s*(\d{1,3})\s*,\s*(\d{2})\s*%\s*\)/i,
      /In\s*fl\s*a[cç][aã]o\s*\((\d{1,3},\d{2})%\)/i,
      /In\s*fl\s*a[cç][aã]o\s*\(\s*(\d{1,3})\s*,\s*(\d{2})\s*%\s*\)/i,
      /Inﬂação\s*\((\d{1,3},\d{2})%\)/i,
      /Inﬂação\s*\(\s*(\d{1,3})\s*,\s*(\d{2})\s*%\s*\)/i,
      /In\s*fl\s*ação\s*\(\s*(\d{1,3})\s*,\s*(\d{2})\s*%\s*\)/i
    ];
    
    for (const padrao of padroes) {
      const match = texto.match(padrao);
      if (match) {
        if (match[1] && match[2]) {
          return parseFloat(match[1] + '.' + match[2]);
        } else if (match[1]) {
          return parseFloat(match[1].replace(',', '.'));
        }
      }
    }
    return null;
  }
  
  // Buscar a seção correta (páginas 5-9 normalmente)
  let secaoAlvo = textoCompleto;
  const idxComposicao = textoCompleto.indexOf('COMPOSIÇÃO');
  const idxEstrategias = textoCompleto.indexOf('Estratégias');
  const idxRentabilidade = textoCompleto.indexOf('RENTABILIDADE');
  
  if (idxComposicao !== -1) {
    secaoAlvo = textoCompleto.substring(idxComposicao, idxComposicao + 2000);
    dbg('✅ Seção "COMPOSIÇÃO" encontrada!');
  } else if (idxEstrategias !== -1) {
    secaoAlvo = textoCompleto.substring(idxEstrategias, idxEstrategias + 2000);
    dbg('✅ Seção "Estratégias" encontrada!');
  } else if (idxRentabilidade !== -1) {
    secaoAlvo = textoCompleto.substring(idxRentabilidade, idxRentabilidade + 2000);
    dbg('✅ Seção "RENTABILIDADE" encontrada!');
  }
  
  dbg('\n--- CONTEÚDO DA SEÇÃO ALVO (onde estão os percentuais) ---');
  dbg(secaoAlvo.substring(0, 1200));
  
  // Extrair INFLAÇÃO com função especial
  const pctInf = extrairInfeccaoEspecial(secaoAlvo);
  if (pctInf) {
    dbg(`\n🎯 INFLAÇÃO capturada: ${pctInf}%`);
  } else {
    dbg(`\n❌ INFLAÇÃO não encontrada na seção alvo`);
  }
  
  // Extrair outros percentuais (com suporte para espaços)
  function extrairPctFlexivel(nome) {
    const partes = nome.split('');
    const regex = new RegExp(partes.join('\\s*') + '\\s*\\(\\s*(\\d{1,3})\\s*,\\s*(\\d{2})\\s*%\\s*\\)', 'i');
    const match = secaoAlvo.match(regex);
    if (match) {
      return parseFloat(match[1] + '.' + match[2]);
    }
    return null;
  }
  
  const pctPos = extrairPctFlexivel('Pós Fixado');
  const pctPre = extrairPctFlexivel('Pré Fixado');
  const pctMulti = extrairPctFlexivel('Multimercado');
  const pctRVBrasil = extrairPctFlexivel('Renda Variável Brasil');
  const pctAlternativo = extrairPctFlexivel('Alternativo');
  
  let rendaVariavelTotal = (pctRVBrasil || 0) + (pctAlternativo || 0);
  
  // Patrimônio
  let patrimonio = 0;
  const patMatch = textoCompleto.match(/PATRIM[OÔ]NIO\s*TOTAL\s*BRUTO[:\s]*R\$\s*([\d\.]+,\d{2})/i);
  if (patMatch) {
    patrimonio = parseFloat(patMatch[1].replace(/\./g, '').replace(',', '.'));
    dbg(`💰 Patrimônio: R$ ${patrimonio.toLocaleString('pt-BR')}`);
  }
  
  const res = {
    "Pós Fixado": { pct: pctPos, val: 0 },
    "Pré Fixado": { pct: pctPre, val: 0 },
    "Inflação": { pct: pctInf, val: 0 },
    "Multimercado": { pct: pctMulti, val: 0 },
    "Renda Variável": { pct: rendaVariavelTotal, val: 0 }
  };
  
  dbg(`\n📊 RESULTADOS FINAIS:`);
  dbg(`Pós Fixado: ${pctPos !== null ? pctPos + '%' : '❌'}`);
  dbg(`Pré Fixado: ${pctPre !== null ? pctPre + '%' : '❌'}`);
  dbg(`Inflação: ${pctInf !== null ? pctInf + '%' : '❌'}`);
  dbg(`Multimercado: ${pctMulti !== null ? pctMulti + '%' : '❌'}`);
  dbg(`Renda Variável Brasil: ${pctRVBrasil !== null ? pctRVBrasil + '%' : '❌'}`);
  dbg(`Alternativo: ${pctAlternativo !== null ? pctAlternativo + '%' : '❌'}`);
  dbg(`Renda Variável TOTAL: ${rendaVariavelTotal}%`);
  
  return { res, patrimonio };
}

function renderInputs() {
  const c = document.getElementById('inputsAtual'); c.innerHTML = '';
  CLASSES.forEach((cl, idx) => {
    const row = document.createElement('div'); row.className = 'classe-row';
    row.innerHTML = `<div class="dot8 ${CORES[idx]}"></div><span class="classe-nome">${cl}</span><input class="classe-input" type="number" step="any" min="0" max="100" value="0"><span class="pct-label">%</span>`;
    c.appendChild(row);
    inputsMap[cl] = row.querySelector('input');
    inputsMap[cl].addEventListener('input', atualizarTotal);
  });
  atualizarTotal();
}

function renderAlvo() {
  const rec = PERFIS[perfilAtivo];
  document.getElementById('perfilLabel').textContent = perfilAtivo;
  document.getElementById('tabelaAlvo').innerHTML = CLASSES.map((c, i) => `
    <div class="alvo-row"><div class="dot8 ${CORES[i]}"></div><span class="alvo-nome">${c}</span>
    <div class="alvo-bar-wrap"><div class="alvo-bar-fill" style="width:${rec[c]}%"></div></div>
    <span class="alvo-pct">${rec[c]}%</span></div>`).join('');
}

function renderPerfis() {
  const icons = { Conservador: '🛡', Moderado: '⚖', Agressivo: '🚀' };
  document.getElementById('perfisRow').innerHTML = Object.keys(PERFIS).map(p => `
    <button class="perfil-btn ${p === perfilAtivo ? 'ativo' : ''}" data-p="${p}">${icons[p]} ${p}</button>`).join('');
  document.querySelectorAll('.perfil-btn').forEach(b => b.addEventListener('click', () => {
    perfilAtivo = b.dataset.p; renderPerfis(); renderAlvo();
    document.getElementById('resultArea').style.display = 'none';
  }));
}

function analisar() {
  let total = 0; const atual = {};
  CLASSES.forEach(c => { atual[c] = parseFloat(inputsMap[c]?.value || 0) || 0; total += atual[c]; });
  if (Math.abs(total - 100) > 0.1) { setStatus('O total deve ser 100% (atual: ' + fmtPct(total) + ')', 'err'); return; }
  const alvo = PERFIS[perfilAtivo]; let nM = 0, nA = 0, nR = 0;
  document.getElementById('listaRec').innerHTML = CLASSES.map((c, i) => {
    const diff = alvo[c] - atual[c]; let bc, label;
    if (Math.abs(diff) < 0.05) { bc = 'b-manter'; label = '✓ Manter'; nM++; }
    else if (diff > 0) { bc = 'b-alocar'; label = '↑ Alocar +' + fmtPct(diff); nA++; }
    else { bc = 'b-retirar'; label = '↓ Retirar ' + fmtPct(Math.abs(diff)); nR++; }
    return `<div class="rec-row"><div class="dot8 ${CORES[i]}"></div><span class="rec-nome">${c}</span><span class="rec-nums">${fmtPct(atual[c])} → ${alvo[c]}%</span><span class="badge ${bc}">${label}</span></div>`;
  }).join('');
  document.getElementById('resumoGrid').innerHTML = `
    <div class="resumo-item"><div class="resumo-label">Manter</div><div class="resumo-val" style="color:var(--amber)">${nM}</div></div>
    <div class="resumo-item"><div class="resumo-label">Alocar</div><div class="resumo-val" style="color:var(--green)">${nA}</div></div>
    <div class="resumo-item"><div class="resumo-label">Retirar</div><div class="resumo-val" style="color:var(--red)">${nR}</div></div>
    <div class="resumo-item"><div class="resumo-label">Perfil</div><div class="resumo-val" style="color:var(--gold);font-size:14px">${perfilAtivo}</div></div>`;
  const area = document.getElementById('resultArea');
  area.style.display = 'block'; area.classList.remove('fade-in'); void area.offsetWidth; area.classList.add('fade-in');
  area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

document.getElementById('filePdf').addEventListener('change', function() {
  document.getElementById('fileName').textContent = this.files[0]?.name || 'Selecionar arquivo PDF...';
});

document.getElementById('btnImportar').addEventListener('click', async () => {
  const file = document.getElementById('filePdf').files[0];
  if (!file) { setStatus('Selecione um arquivo PDF primeiro.', 'err'); return; }
  const dbgEl = document.getElementById('debugBox'); dbgEl.textContent = ''; dbgEl.classList.remove('show');
  document.getElementById('patrimTag').classList.remove('show');
  document.getElementById('overlay').classList.add('show');
  try {
    const { res, patrimonio } = await extrairDadosPDF(file);
    let encontrou = false;
    for (const classe of CLASSES) {
      if (res[classe] && res[classe].pct !== null && res[classe].pct > 0) {
        inputsMap[classe].value = res[classe].pct.toFixed(2);
        encontrou = true;
      }
    }
    atualizarTotal();
    if (encontrou) {
      setStatus('✅ PDF importado com sucesso!', 'ok');
      if (patrimonio > 0) {
        document.getElementById('patrimVal').innerHTML = fmtBRL(patrimonio);
        document.getElementById('patrimTag').classList.add('show');
      }
    } else {
      setStatus('❌ Não foi possível extrair os dados. Veja o debug.', 'err');
    }
  } catch (e) {
    setStatus('Erro: ' + e.message, 'err'); dbg('ERRO: ' + e.message);
  } finally {
    document.getElementById('overlay').classList.remove('show');
  }
});

document.getElementById('btnLimpar').addEventListener('click', () => {
  CLASSES.forEach(c => { if (inputsMap[c]) inputsMap[c].value = '0'; });
  atualizarTotal();
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('status').classList.remove('show');
  document.getElementById('patrimTag').classList.remove('show');
  document.getElementById('debugBox').textContent = '';
  document.getElementById('debugBox').classList.remove('show');
  document.getElementById('filePdf').value = '';
  document.getElementById('fileName').textContent = 'Selecionar arquivo PDF...';
});

document.getElementById('btnAnalisar').addEventListener('click', analisar);
document.getElementById('themeToggle').addEventListener('click', () => {
  const body = document.body;
  const btn = document.getElementById('themeToggle');
  if (body.classList.contains('light')) {
    body.classList.remove('light');
    localStorage.setItem('theme', 'dark');
    btn.textContent = '🌙';
  } else {
    body.classList.add('light');
    localStorage.setItem('theme', 'light');
    btn.textContent = '☀️';
  }
});

(function init() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeToggle').textContent = '☀️';
  }
  document.getElementById('hDate').textContent = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
  renderInputs(); renderPerfis(); renderAlvo();
})();
</script>
</body>
</html>
